<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pesquisas Universitárias</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

    <!-- ======= PÁGINA: LOGIN ======= -->
    <div id="page-auth" class="page active">
        <div class="auth-page">
            <div class="auth-card">
                <div class="auth-logo">
                    <h1>🎓 SisPesquisa</h1>
                    <p>Sistema de Gerenciamento de Projetos de Pesquisa</p>
                </div>
                <div class="auth-tabs">
                    <button class="auth-tab ativo" onclick="authTab('login', this)">Entrar</button>
                    <button class="auth-tab" onclick="authTab('cadastro', this)">Cadastrar</button>
                </div>

                <!-- Login -->
                <div id="form-login">
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input id="login-email" type="email" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input id="login-senha" type="password" class="form-control" placeholder="••••••">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="fazerLogin()">Entrar</button>
                </div>

                <!-- Cadastro -->
                <div id="form-cadastro" style="display:none">
                    <div class="form-group">
                        <label class="form-label">Tipo de conta</label>
                        <select id="cad-tipo" class="form-control" onchange="atualizarCamposCadastro()">
                            <option value="ALUNO">Aluno</option>
                            <option value="PROFESSOR">Professor</option>
                            <option value="COORDENADOR">Coordenador</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nome completo</label>
                        <input id="cad-nome" type="text" class="form-control" placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input id="cad-email" type="email" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input id="cad-senha" type="password" class="form-control" placeholder="••••••">
                    </div>
                    <div id="campos-extras"></div>
                    <button class="btn btn-primary" style="width:100%" onclick="fazerCadastro()">Criar conta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ======= LAYOUT PRINCIPAL ======= -->
    <div id="page-main" class="page" style="display:none">
        <!-- Navbar -->
        <nav id="navbar">
            <div class="nav-brand">🎓 SisPesquisa</div>
            <div class="nav-links" id="nav-links"></div>
            <div class="nav-user">
                <button class="notif-btn" onclick="toggleNotificacoes()" title="Notificações">
                    🔔 <span id="notif-badge" class="notif-badge" style="display:none">0</span>
                </button>
                <span id="nav-user-nome"></span>
                <button class="btn btn-sm btn-secondary" onclick="logout()">Sair</button>
            </div>
        </nav>

        <!-- Painel de Notificações -->
        <div id="notif-panel" class="notif-panel" style="display:none">
            <div class="notif-panel-header">
                <span>Notificações</span>
                <button class="btn btn-sm btn-secondary" onclick="marcarTodasLidas()">Marcar lidas</button>
            </div>
            <div class="notif-list" id="notif-list"></div>
        </div>

        <!-- Conteúdo -->
        <div id="main-content" class="main"></div>
    </div>

</div>

<!-- ======= MODAIS ======= -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="fecharModal(event)">
    <div class="modal" id="modal-box">
        <div class="modal-header">
            <span class="modal-title" id="modal-title"></span>
            <button class="modal-close" onclick="fecharModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<!-- Loading e Toasts -->
<div id="loading"><div class="spinner"></div></div>
<div id="toasts"></div>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/pages.js"></script>
<script>
    // Inicialização
    session.carregar();
    if (session.logado) {
        mostrarApp();
        renderizarNavbar();
        carregarPaginaInicial();
    }
    // Enter nos campos de login
    document.getElementById('login-senha').addEventListener('keydown', e => {
        if (e.key === 'Enter') fazerLogin();
    });
    setInterval(atualizarNotifBadge, 30000);
</script>
</body>
</html>
